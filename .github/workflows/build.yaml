name: Build and Release

on:
  push:
    tags:
      - 'v*' # 推送 v 开头的标签时触发构建并发布 release
    branches:
      - dev  # dev 分支只构建，不发布
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write # 创建 release 需要写权限

env:
  OUTPUT_NAME: taiji

jobs:
  build:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        os: [linux, windows, darwin] # 支持的操作系统
        arch: [amd64, arm64]         # 支持的架构
        exclude:
          - os: windows
            arch: arm64 # 排除 windows/arm64 组合
    steps:
      # Step 1: 检出代码
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Step 2: 设置 Go 环境
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      # Step 3: 编译多个平台和架构的二进制
      - name: Cross-compile Go binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          make

      # Step 4: 上传构建产物
      - name: Upload Binaries ${{ matrix.os }}/${{ matrix.arch }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.OUTPUT_NAME }}-${{ matrix.os }}-${{ matrix.arch }}
          path: bin/*
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # 下载所有构建产物到 dist 目录（每个 artifact 一个子目录）
      - name: Download package artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: List assets
        run: ls -lhR dist

      # 创建 release（若不存在）并上传所有软件包
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" \
              --title "$TAG_NAME" \
              --generate-notes \
              --verify-tag
          fi

          gh release upload "$TAG_NAME" dist/* --clobber
